name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Lint (compile)
        run: |
          python -m compileall -q agency ajax ui

      - name: Check Pseudocode Map refs
        run: |
          python scripts/ci/check_pseudocode_map_refs.py --root .

      - name: Tests
        run: |
          pytest -q
